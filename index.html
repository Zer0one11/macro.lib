<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Macros Search</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 700px; background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #58a6ff; text-align: center; margin-bottom: 25px; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { 
            flex-grow: 1; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; font-size: 16px; outline: none;
        }
        input:focus { border-color: #58a6ff; }
        
        button { 
            padding: 12px 25px; background: #238636; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #2ea043; }

        #loader { display: none; text-align: center; margin: 20px 0; color: #8b949e; }
        
        .result-item { 
            background: #21262d; padding: 15px; margin-top: 12px; border-radius: 8px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center;
        }
        .info { display: flex; flex-direction: column; gap: 5px; }
        .name { color: #58a6ff; font-weight: bold; font-size: 17px; }
        
        /* Тег расширения */
        .ext-badge { 
            display: inline-block; padding: 2px 8px; background: #30363d; color: #f0f6fc; border-radius: 12px; font-size: 12px; text-transform: uppercase; width: fit-content;
        }

        .actions { display: flex; gap: 10px; }
        .btn-link { color: #8b949e; text-decoration: none; font-size: 14px; }
        .btn-link:hover { color: #58a6ff; }
        .btn-download { background: #30363d; color: white; padding: 8px 12px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: bold; }
        .btn-download:hover { background: #3fb950; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔎 GD Macros Archive</h2>
    
    <div class="search-box">
        <input type="text" id="macroName" placeholder="Название макроса..." onkeypress="if(event.key==='Enter') searchMacros()">
        <button onclick="searchMacros()">Найти</button>
    </div>
    
    <div id="loader">Ищем в базе данных...</div>
    <div id="results"></div>
</div>

<script>
    async function searchMacros() {
        const queryText = document.getElementById('macroName').value.trim();
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');

        if (!queryText) return;

        resultsDiv.innerHTML = '';
        loader.style.display = 'block';

        const REPO = 'DRANONG/GDMacrosArchive';
        // Поиск по всему пути files/Filtered/ без фильтрации расширения в запросе
        const searchQuery = `${queryText} repo:${REPO} path:files/Filtered/`;

        try {
            const response = await fetch(`/api/search?q=${encodeURIComponent(searchQuery)}`);
            const data = await response.json();
            loader.style.display = 'none';

            if (data.items && data.items.length > 0) {
                data.items.forEach(item => {
                    const fileName = item.name;
                    // Достаем расширение из имени файла
                    const extension = fileName.split('.').pop();
                    const rawUrl = `https://raw.githubusercontent.com/${REPO}/main/${item.path}`;

                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <div class="info">
                            <span class="name">${fileName}</span>
                            <span class="ext-badge">${extension}</span>
                        </div>
                        <div class="actions">
                            <a href="${item.html_url}" target="_blank" class="btn-link">GitHub</a>
                            <a href="${rawUrl}" target="_blank" class="btn-download">📥 Скачать</a>
                        </div>
                    `;
                    resultsDiv.appendChild(div);
                });
            } else {
                resultsDiv.innerHTML = '<p style="text-align:center; color:#8b949e;">Ничего не найдено</p>';
            }
        } catch (error) {
            loader.style.display = 'none';
            resultsDiv.innerHTML = '<p style="color:#f85149; text-align:center;">Ошибка сервера. Проверь токен в Vercel.</p>';
        }
    }
</script>

</body>
</html>
