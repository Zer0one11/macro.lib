<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Macros Search</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; }
        input, select, button { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { background: #238636; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #2ea043; }
        .result-item { text-align: left; background: #21262d; padding: 15px; margin-top: 10px; border-radius: 6px; }
        a { color: #58a6ff; text-decoration: none; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔎 Macro Search</h2>
    <input type="text" id="macroName" placeholder="Название (регистр не важен)...">
    <select id="extension">
        <option value="">Все расширения</option>
        <option value="extension:echo">ECHO</option>
        <option value="extension:gdr">GDR</option>
        <option value="extension:mhr">MHR</option>
        <option value="extension:re">RE</option>
    </select>
    <button onclick="searchMacros()">Найти</button>
    
    <div id="loader" style="display:none;">Поиск...</div>
    <div id="results"></div>
</div>

<script>
    async function searchMacros() {
        const queryText = document.getElementById('macroName').value.trim();
        const ext = document.getElementById('extension').value;
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');

        if (!queryText) return alert("Введите название!");

        resultsDiv.innerHTML = '';
        loader.style.display = 'block';

        const REPO = 'DRANONG/GDMacrosArchive';
        const searchQuery = `${queryText} repo:${REPO} path:files/Filtered/ ${ext}`;

        try {
            // Запрос идет к твоей серверной функции в папке /api
            const response = await fetch(`/api/search?q=${encodeURIComponent(searchQuery)}`);
            const data = await response.json();

            loader.style.display = 'none';

            if (data.items && data.items.length > 0) {
                data.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    const rawUrl = `https://raw.githubusercontent.com/${REPO}/main/${item.path}`;
                    div.innerHTML = `
                        <strong>${item.name}</strong><br>
                        <a href="${item.html_url}" target="_blank">GitHub</a>
                        <a href="${rawUrl}" target="_blank" style="color:#3fb950;">Скачать</a>
                    `;
                    resultsDiv.appendChild(div);
                });
            } else {
                resultsDiv.innerHTML = 'Ничего не найдено';
            }
        } catch (error) {
            loader.style.display = 'none';
            resultsDiv.innerHTML = '<span style="color:red;">Ошибка сервера. Проверь логи Vercel и токен.</span>';
        }
    }
</script>

</body>
</html>
