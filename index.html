<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Macros Search</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: #161b22; padding: 25px; border-radius: 8px; border: 1px solid #30363d; }
        .search-area { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; outline: none; }
        button { padding: 10px 20px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .item { background: #21262d; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .ext-label { font-size: 12px; color: #8b949e; margin-top: 4px; display: block; }
        .download-btn { color: #3fb950; text-decoration: none; font-weight: bold; font-size: 14px; border: 1px solid #3fb950; padding: 5px 10px; border-radius: 4px; }
        .download-btn:hover { background: #3fb950; color: white; }
        #loader { display: none; text-align: center; color: #8b949e; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-area">
        <input type="text" id="inp" placeholder="Название макроса..." onkeypress="if(event.key==='Enter') search()">
        <button onclick="search()">Найти</button>
    </div>
    <div id="loader">Поиск...</div>
    <div id="results"></div>
</div>

<script>
    async function search() {
        const val = document.getElementById('inp').value.trim();
        const resDiv = document.getElementById('results');
        const loader = document.getElementById('loader');

        if (!val) return;

        resDiv.innerHTML = '';
        loader.style.display = 'block';

        try {
            const r = await fetch(`/api/search?q=${encodeURIComponent(val)}`);
            const data = await r.json();
            loader.style.display = 'none';

            if (data.items && data.items.length > 0) {
                data.items.forEach(file => {
                    const ext = file.name.split('.').pop();
                    // Ссылка на скачивание файла напрямую
                    const rawUrl = `https://raw.githubusercontent.com/DRANONG/GDMacrosArchive/main/${file.path}`;
                    
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `
                        <div>
                            <div style="font-weight: bold;">${file.name}</div>
                            <span class="ext-label">Расширение: ${ext}</span>
                        </div>
                        <a href="${rawUrl}" download="${file.name}" target="_blank" class="download-btn">Скачать</a>
                    `;
                    resDiv.appendChild(div);
                });
            } else {
                resDiv.innerHTML = '<p style="text-align:center;">Ничего не найдено</p>';
            }
        } catch (e) {
            loader.style.display = 'none';
            resDiv.innerHTML = '<p style="color:red; text-align:center;">Ошибка сервера</p>';
        }
    }
</script>

</body>
</html>
